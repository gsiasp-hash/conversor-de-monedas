<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conversor de monedas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body
    class="bg-light d-flex justify-content-center align-items-center vh-100"
  >
    <div class="container bg-secondary rounded text-light text-center m-20 p-4">
      <h1 class="fw-bold">Conversor de monedas</h1>
      <div class="container bg-black rounded d-flex flex-column">
        <h2>Pesos CLP</h2>
        <input
          type="number"
          id="pesosInput"
          class="form-control mb-3"
          placeholder="Ingrese la cantidad en pesos chilenos"
        />
        <h2>Moneda a convertir</h2>
        <select id="currencySelect" class="form-select mb-3">
          <option value="USD">Dólares (USD)</option>
          <option value="EUR">Euros (EUR)</option>
          <option value="GBP">Libras Esterlinas (GBP)</option>
          <option value="BTC">Bitcoin (BTC)</option>
        </select>
        <button id="convertButton" class="btn btn-primary mb-3">
          Convertir
        </button>
        <h2 id="result" class="fw-bold"></h2>
        <canvas id="chart" width="300" height="100"></canvas>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
